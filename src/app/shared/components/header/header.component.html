<div class="navbar bg-base-100/90 backdrop-blur shadow-md px-4">

  <div class="navbar-start">
    <button type="button" class="flex items-center gap-2" (click)="scrollTop()">
      <img ngSrc="assets/logos/GPPAP-icon.png" alt="Grand Prix Pap" width="40" height="40" class="h-10 w-auto" />
    </button>
  </div>

  <div class="navbar-end hidden md:flex">
    <ul class="menu menu-horizontal gap-1 px-1 text-sm">
      <li>
        <button type="button" class="flex items-center gap-2" (click)="scrollTo('downloads')">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
          Downloads
        </button>
      </li>
      <li>
        <button type="button" class="flex items-center gap-2" (click)="scrollTo('signup')">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 3c1.93 0 3.5 1.57 3.5 3.5S13.93 13 12 13s-3.5-1.57-3.5-3.5S10.07 6 12 6zm7 13H5v-.23c0-.62.28-1.2.76-1.58C7.47 15.82 9.64 15 12 15s4.53.82 6.24 2.19c.48.38.76.97.76 1.58V19z"/></svg>
          Sign-up
        </button>
      </li>
    </ul>
  </div>

  <div class="navbar-end md:hidden">
    <div class="dropdown dropdown-end">
      <label tabindex="0" class="btn btn-ghost btn-sm">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
      </label>
      <ul tabindex="0" class="menu menu-sm dropdown-content bg-base-100 rounded-box z-50 mt-3 w-48 p-2 shadow text-sm">
        <li><button type="button" (click)="scrollTo('downloads')">Downloads</button></li>
        <li><button type="button" (click)="scrollTo('signup')">Sign-up</button></li>
      </ul>
    </div>
  </div>

</div>
