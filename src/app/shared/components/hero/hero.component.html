<section class="hero">
  <div class="hero-bg-stack">
    <div
      class="hero-bg"
      [class.hero-bg-active]="bg.activeLayer() === 'a'"
      [style.backgroundImage]="cssUrl(bg.backgroundA())"
    ></div>
    <div
      class="hero-bg"
      [class.hero-bg-active]="bg.activeLayer() === 'b'"
      [style.backgroundImage]="cssUrl(bg.backgroundB())"
    ></div>
    <div class="hero-crt" aria-hidden="true"></div>
  </div>

  <div class="hero-overlay"></div>

  <div class="hero-content">
    <img
      ngSrc="assets/logos/GPPAP-logo.png"
      alt="Grand Prix Pap"
      width="2048"
      height="866"
      priority
      class="hero-logo"
    />
    <p class="hero-tagline banner-subtitle text-center text-base md:text-xl max-w-2xl">
      Formula Grand Prix — uma homenagem ao Grand Prix 3, com física acessível e pilotagem ágil para corridas emocionantes.
    </p>
  </div>
</section>
